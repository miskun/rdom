name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--all-targets` covers libs, bins, integration tests, benches,
      # AND examples. The 7 `rdom-tui` examples can't be `cargo test`'d
      # (they're TTY-bound `main`s, not test harnesses) — instead, the
      # `ua_chrome_snapshot` integration test runs the same DOM
      # construction through a TestBackend pipeline and golden-compares
      # the painted buffer, so visible regressions to the UA chrome
      # are caught here.
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `--all-targets` lints lib + bins + tests + examples + benches.
      # Examples therefore can't ship warnings either.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
